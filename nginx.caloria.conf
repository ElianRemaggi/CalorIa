# Nginx config for CalorIA backend
# Place at: /etc/nginx/sites-available/caloria
# Enable with: ln -s /etc/nginx/sites-available/caloria /etc/nginx/sites-enabled/caloria
# Then: nginx -t && systemctl reload nginx
#
# Before enabling: obtain TLS cert with
#   certbot --nginx -d api.caloria.com

server {
    listen 80;
    server_name api.caloria.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.caloria.com;

    ssl_certificate     /etc/letsencrypt/live/api.caloria.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.caloria.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to CalorIA backend
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (Spring Boot can be slow on first request)
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Health check endpoint — no rate limit
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080/actuator/health;
    }
}
