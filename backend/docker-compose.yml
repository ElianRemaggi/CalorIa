version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: caloria
      POSTGRES_USER: caloria
      POSTGRES_PASSWORD: caloria
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caloria"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
